        /**
         * NOUVEAU: Formate un nombre (ex: 1000 -> 1k, 3300 -> 3.3k)
         */
        function formatNumber(num) {
            if (!num) return '0';
            if (num < 1000) {
                return num.toString();
            }
            if (num < 1000000) {
                const result = (num / 1000).toFixed(1);
                return result.endsWith('.0') ? (num / 1000).toFixed(0) + 'k' : result + 'k';
            }
            const result = (num / 1000000).toFixed(1);
            return result.endsWith('.0') ? (num / 1000000).toFixed(0) + 'M' : result + 'M';
        }

        /**

        function showToast(message, type = 'info') {
            let bgColor = 'bg-blue-500'; // info
            if (type === 'error') bgColor = 'bg-red-500';
            if (type === 'success') bgColor = 'bg-green-500';
            
            toast.textContent = message;
            toast.className = ''; // Reset classes
            toast.classList.add(bgColor, 'show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);

            categorySearchInput.value = '';

                case '#home':
                    showPage('home-page');
                    await loadAndDisplayResources(homeResourcesContainer);
                    break;
                case '#auth':
                    if (currentUserId) {
                        location.hash = '#home'; 
                    } else {
                        showPage('auth-page');
                    }
                    break;
                case '#category':
                    showPage('category-page');
                    const categoryName = decodeURIComponent(param || '');
                    categoryTitle.textContent = categoryName || 'Catégorie';
                    await loadAndDisplayResources(categoryResourcesContainer, { category: categoryName });
                    break;
                case '#profile':
                    showPage('profile-page');
                    renderProfile(param || currentUserId);
                    break;
                case '#create':
                    if (!currentUserId) {

                    } else {
                        showPage('create-page');
                    }
                    break;
                default:
                    location.hash = '#home';
                    break;
            }
        }

        // --- RENDU DES RESSOURCES ---

        /**
         * Charge les ressources depuis Firestore et les met en cache
         */
        async function fetchAllResourcesOnce() {
            if (allResources.length > 0) {
                return false; 
            }
            
            try {
                const resourcesRef = collection(db, resourcesCollectionPath);
                const querySnapshot = await getDocs(resourcesRef);
                
                let resources = [];
                querySnapshot.forEach((doc) => {
                    resources.push({ id: doc.id, ...doc.data() });
                });
                
                const userIds = [...new Set(resources.map(r => r.authorId))];
                if (userIds.length > 0) {
                    const usersQuery = query(collection(db, usersCollectionPath), where("uid", "in", userIds));
                    const usersSnapshot = await getDocs(usersQuery);
                    usersSnapshot.forEach(doc => {
                        allUsersData[doc.data().uid] = doc.data();
                    });
                }
                
                resources.sort((a, b) => (b.createdAt?.toDate() || 0) - (a.createdAt?.toDate() || 0));
                
                allResources = resources;
                return true;

            } catch (error) {
                console.error("Erreur fetchAllResourcesOnce:", error);
                throw error;
            }
        }

        /**
         * Fonction principale pour charger ET afficher les ressources
         */
        async function loadAndDisplayResources(container, filters = {}) {
            if (!container) return;
            container.innerHTML = '<p class="text-gray-500">Chargement des ressources...</p>';
            
            try {
                await fetchAllResourcesOnce();
                renderResources(container, filters, '');
                
            } catch (error) {
                console.error("Erreur loadAndDisplayResources:", error);
                container.innerHTML = `<p class="text-red-500">Erreur lors du chargement des ressources: ${error.message}</p>`;
            }
        }
        
        /**
         * Affiche les ressources depuis le cache, en appliquant filtres et recherche.
         */
        function renderResources(container, filters = {}, searchTerm = '') {
            if (!container) return;
            
            let resourcesToDisplay = [...allResources];
            
            if (filters.category) {
                resourcesToDisplay = resourcesToDisplay.filter(
                    res => res.category === filters.category
                );
            }
            
            const search = searchTerm.toLowerCase().trim();
            if (search) {
                resourcesToDisplay = resourcesToDisplay.filter(res => {
                    const author = allUsersData[res.authorId];
                    return (
                        res.title.toLowerCase().includes(search) ||
                        res.category.toLowerCase().includes(search) ||
                        res.subcategory.toLowerCase().includes(search) ||
                        (author && author.username.toLowerCase().includes(search)) ||
                        res.textContent.toLowerCase().includes(search)
                    );
                });
            }

            if (resourcesToDisplay.length === 0) {
                if (search) {
                    container.innerHTML = `<p class="text-gray-500">Aucune ressource ne correspond à "${searchTerm}".</p>`;
                } else if (filters.category) {
                    container.innerHTML = '<p class="text-gray-500">Aucune ressource trouvée dans cette catégorie.</p>';
                } else {
                    container.innerHTML = '<p class="text-gray-500">Aucune ressource publiée pour le moment.</p>';
                }
                return;
            }

            container.innerHTML = '';
            resourcesToDisplay.forEach(resource => {
                const author = allUsersData[resource.authorId];
                const card = createResourceCard(resource, author);
                container.appendChild(card);
            });
            
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        }


        /**
         * Crée un élément DOM de carte pour une ressource.
         */
        function createResourceCard(resource, author) {
            const card = document.createElement('div');
            card.className = 'bg-white rounded-lg shadow-lg overflow-hidden transition-shadow duration-300 hover:shadow-xl';
            
            let imageHtml = '';
            if (resource.imageUrl) {
                imageHtml = `<img src="${resource.imageUrl}" alt="${resource.title}" class="h-48 w-full object-cover">`;
            }

            card.innerHTML = `
                ${imageHtml}
                <div class="p-6">
                    <span class="text-xs font-semibold text-blue-600 uppercase">${resource.category} > ${resource.subcategory}</span>
                    <h3 class="text-2xl font-bold text-gray-900 mt-2 mb-3">${resource.title}</h3>
                    
                    <div class="text-gray-700 mb-4 h-20 overflow-hidden relative">
                         <div class="ql-snow"><div class="ql-editor p-0">${resource.textContentHtml || ''}</div></div>
                         <div class="absolute bottom-0 left-0 w-full h-8 bg-gradient-to-t from-white to-transparent"></div>
                    </div>
                    
                    <div class="flex items-center justify-between mt-4">
                        <a href="#profile?id=${resource.authorId}" class="text-sm font-medium text-gray-800 hover:text-blue-600">
                            Par ${author ? author.username : 'Anonyme'}
                        </a>
                        <button class="like-btn flex items-center space-x-1 text-gray-500 hover:text-red-500" data-resource-id="${resource.id}">
                            <i data-lucide="heart" class="h-5 w-5 ${resource.likes?.includes(currentUserId) ? 'fill-current text-red-500' : ''}"></i>
                            <span>${resource.likes?.length || 0}</span>
                        </button>
                    </div>
                </div>
            `;
            
            card.querySelector('.like-btn').addEventListener('click', async (e) => {
                e.stopPropagation();
                if (!currentUserId) {
                    showToast("Vous devez être connecté pour aimer une ressource.", "error");
                    location.hash = '#auth';
                    return;
                }
                await toggleLike(resource.id, e.currentTarget, resource);
            });

            return card;
        }

        // --- GESTION LIKE / ABONNEMENT ---

        /**
         * Gère le clic sur le bouton "like".
         */
        async function toggleLike(resourceId, buttonElement, resource) {
            const resourceRef = doc(db, resourcesCollectionPath, resourceId);
            const icon = buttonElement.querySelector('i');
            const countSpan = buttonElement.querySelector('span');
            
            const isLiked = resource.likes?.includes(currentUserId);
            
            try {
                if (isLiked) {
                    // Un-like
                    icon.classList.remove('fill-current', 'text-red-500');
                    resource.likes = resource.likes.filter(id => id !== currentUserId);
                    countSpan.textContent = resource.likes.length;
                    await updateDoc(resourceRef, {
                        likes: arrayRemove(currentUserId)
                    });
                } else {
                    // Like
                    icon.classList.add('fill-current', 'text-red-500');
                    if (!resource.likes) resource.likes = [];
                    resource.likes.push(currentUserId);
                    countSpan.textContent = resource.likes.length;
                    await updateDoc(resourceRef, {
                        likes: arrayUnion(currentUserId)
                    });
                }
            } catch (error) {
                console.error("Erreur toggleLike:", error);
                showToast("Erreur lors de l'action.", "error");
            }
        }
        
        /**
         * NOUVEAU: Gère le clic sur le bouton "s'abonner" (avec compteur).
         */
        async function toggleSubscription(targetUserId, buttonElement) {
            if (!currentUserId) {
                showToast("Vous devez être connecté.", "error");
                return;
            }
            if (currentUserId === targetUserId) {
                showToast("Vous ne pouvez pas vous abonner à vous-même.", "info");
                return;
            }

            const currentUserRef = doc(db, usersCollectionPath, currentUserId);
            const targetUserRef = doc(db, usersCollectionPath, targetUserId); // Réf de l'utilisateur cible
            const isSubscribed = currentUserProfile.following?.includes(targetUserId);

            try {
                if (isSubscribed) {
                    // Se désabonner
                    await updateDoc(currentUserRef, { following: arrayRemove(targetUserId) });
                    await updateDoc(targetUserRef, { followerCount: increment(-1) }); // Décrémenter
                    
                    currentUserProfile.following = currentUserProfile.following.filter(id => id !== targetUserId);
                    buttonElement.textContent = "S'abonner";
                    buttonElement.classList.replace('bg-gray-500', 'bg-blue-600');
                    buttonElement.classList.replace('hover:bg-gray-600', 'hover:bg-blue-700');
                } else {
                    // S'abonner
                    await updateDoc(currentUserRef, { following: arrayUnion(targetUserId) });
                    await updateDoc(targetUserRef, { followerCount: increment(1) }); // Incrémenter
                    
                    currentUserProfile.following = [...(currentUserProfile.following || []), targetUserId];
                    buttonElement.textContent = "Abonné";
                    buttonElement.classList.replace('bg-blue-600', 'bg-gray-500');
                    buttonElement.classList.replace('hover:bg-blue-700', 'hover:bg-gray-600');
                }
                
                // Mettre à jour localement le profil (pour le compteur)
                const targetProfile = allUsersData[targetUserId];
                if (targetProfile) {
                    targetProfile.followerCount = (targetProfile.followerCount || 0) + (isSubscribed ? -1 : 1);
                }

                if (typeof lucide !== 'undefined') {
                    lucide.createIcons();
                }
            } catch (error) {
                console.error("Erreur toggleSubscription:", error);
                showToast("Erreur lors de l'abonnement.", "error");
            }
        }


        // --- RENDU PROFIL ---
        
        /**
         * NOUVEAU: Affiche le profil (avec compteur et badge image).
         */
        async function renderProfile(userId) {
            if (!userId) {
                profileContainer.innerHTML = '<p class="text-red-500">Aucun utilisateur spécifié.</p>';
                return;
            }
            profileContainer.innerHTML = '<p class="text-gray-500">Chargement du profil...</p>';

            try {
                // 1. Récupérer le profil
                const userRef = doc(db, usersCollectionPath, userId);
                const userSnap = await getDoc(userRef);

                if (!userSnap.exists()) {
                    profileContainer.innerHTML = '<p class="text-red-500">Profil introuvable.</p>';
                    return;
                }
                
                const profile = userSnap.data();
                allUsersData[userId] = profile; // Mettre à jour le cache

                // 2. Vérifier l'état d'abonnement
                let subscribeButtonHtml = '';
                if (currentUserId && currentUserId !== userId) {
                    const isSubscribed = currentUserProfile.following?.includes(userId);
                    subscribeButtonHtml = `
                        <button id="subscribe-btn" class="ml-4 px-4 py-2 rounded-md text-white ${isSubscribed ? 'bg-gray-500 hover:bg-gray-600' : 'bg-blue-600 hover:bg-blue-700'}">
                            ${isSubscribed ? 'Abonné' : "S'abonner"}
                        </button>
                    `;
                }

                // 3. Afficher les infos du profil
                profileContainer.innerHTML = `
                    <div class="flex flex-col md:flex-row items-center mb-6">
                        <div class="flex-shrink-0 w-24 h-24 bg-gray-300 rounded-full flex items-center justify-center mb-4 md:mb-0">
                            <i data-lucide="user" class="w-12 h-12 text-gray-600"></i>
                        </div>
                        <div class="md:ml-6 text-center md:text-left">
                            <div class="flex items-center justify-center md:justify-start">
                                <h2 class="text-3xl font-bold text-gray-900">${profile.username}</h2>
                                ${profile.certification ? `
                                    <img src="https://img.icons8.com/fluency/48/verified-badge--v1.png" alt="Certifié" class="w-5 h-5 ml-2 rounded-full" title="Utilisateur certifié">
                                ` : ''}
                            </div>
                            <p class="text-gray-600">
                                Membre depuis ${profile.createdAt?.toDate().toLocaleDateString('fr-FR') || 'Date inconnue'}
                            </p>
                            <p class="text-gray-500 font-semibold">
                                ${formatNumber(profile.followerCount || 0)} Abonnés
                            </p>
                            <p class="text-sm text-gray-500">UserID: ${profile.uid}</p>
                        </div>
                        <div class="mt-4 md:mt-0 md:ml-auto">
                            ${subscribeButtonHtml}
                        </div>
                    </div>
                    
                    <div class="mb-6">
                        <h3 class="text-xl font-semibold text-gray-800 mb-3">Badges</h3>
                        <div class="flex flex-wrap gap-2">
                            <span class="bg-gray-200 text-gray-700 text-sm px-3 py-1 rounded-full">Bientôt disponible...</span>
                        </div>
                    </div>
                    
                    <div>
                        <h3 class="text-xl font-semibold text-gray-800 mb-4">Ressources publiées</h3>
                        <div id="profile-resources-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <!-- Les ressources du profil seront chargées ici -->
                        </div>
                    </div>
                `;
                
                // 4. Écouteur pour le bouton d'abonnement
                const subBtn = document.getElementById('subscribe-btn');
                if (subBtn) {
                    subBtn.addEventListener('click', () => toggleSubscription(userId, subBtn));
                }

                // 5. Charger les ressources de cet utilisateur
                const userResourcesContainer = document.getElementById('profile-resources-container');
                await fetchAllResourcesOnce();
                const userResources = allResources.filter(r => r.authorId === userId);
                
                if (userResources.length === 0) {
                    userResourcesContainer.innerHTML = '<p class="text-gray-500">Cet utilisateur n\'a pas encore publié de ressources.</p>';
                } else {
                    userResourcesContainer.innerHTML = '';
                    userResources.forEach(resource => {
                        const card = createResourceCard(resource, profile);
                        userResourcesContainer.appendChild(card);
                    });
                }
                
                if (typeof lucide !== 'undefined') {
                    lucide.createIcons();
                }

            } catch (error) {
                console.error("Erreur renderProfile:", error);
                profileContainer.innerHTML = '<p class="text-red-500">Erreur lors du chargement du profil.</p>';
            }
        }
        

        // --- AUTHENTIFICATION ---

        /**
         * Met à jour l'interface utilisateur en fonction de l'état de connexion.
         */
        function updateAuthUI(user) {
            if (user) {
                authInfoSidebar.innerHTML = `
                    <a href="#profile?id=${user.uid}" class="block text-center font-medium text-gray-200 hover:text-white mb-4">
                        ${currentUserProfile ? currentUserProfile.username : 'Chargement...'}
                    </a>
                    <button id="logout-btn" class="w-full bg-red-600 text-white py-2 px-4 rounded-md hover:bg-red-700">
                        Déconnexion
                    </button>
                `;
                document.getElementById('logout-btn').addEventListener('click', async () => {
                    await signOut(auth);
                    showToast("Déconnexion réussie.", "success");
                    location.hash = '#home';
                    allResources = [];
                    allUsersData = {};
                });
                
                if (currentUserProfile && currentUserProfile.certification) {
                    imageUploadContainer.classList.remove('hidden');
                } else {
                    imageUploadContainer.classList.add('hidden');
                }
                
            } else {
                authInfoSidebar.innerHTML = `
                    <a href="#auth" class="w-full text-center block bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700">
                        Connexion / Inscription
                    </a>
                `;
                imageUploadContainer.classList.add('hidden');
            }
            
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        }

        /**
         * NOUVEAU: Crée un profil utilisateur (avec followerCount).
         */
        async function createUserProfile(uid, email, username) {
            const userRef = doc(db, usersCollectionPath, uid);
            try {
                await setDoc(userRef, {
                    uid: uid,
                    email: email,
                    username: username,
                    createdAt: Timestamp.now(),
                    certification: false,
                    badges: [],
                    following: [],
                    followerCount: 0 // Initialisation du compteur
                });
            } catch (error) {
                console.error("Erreur création profil:", error);
                showToast("Erreur lors de la création du profil.", "error");
            }
        }

        // Écouteur principal de l'état d'authentification
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUserId = user.uid;
                const userRef = doc(db, usersCollectionPath, user.uid);
                const docSnap = await getDoc(userRef);
                
                if (docSnap.exists()) {
                    currentUserProfile = docSnap.data();
                } else {
                    const username = user.displayName || user.email.split('@')[0];
                    await createUserProfile(user.uid, user.email, username);
                    currentUserProfile = { 
                        uid: user.uid, 
                        email: user.email, 
                        username: username, 
                        certification: false, 
                        following: [], 
                        followerCount: 0 
                    };
                }
                
                updateAuthUI(user);
                
                if (location.hash === '#auth') {
                    location.hash = '#home';
                }
            } else {
                currentUserId = null;
                currentUserProfile = null;
                updateAuthUI(null);
            }
            router();
            
            // Mettre à jour les "likes" sur la page actuelle
            if (location.hash === '#home') {
                renderResources(homeResourcesContainer, {}, homeSearchInput.value);
            } else if (location.hash.startsWith('#category')) {
                const categoryName = decodeURIComponent(location.hash.split('?id=')[1] || '');
                renderResources(categoryResourcesContainer, { category: categoryName }, categorySearchInput.value);
            }
        });


        // --- ÉCOUTEURS D'ÉVÉNEMENTS (LISTENERS) ---
        
        // Bascule entre Connexion et Inscription
        showSignupBtn.addEventListener('click', () => {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('signup-view').classList.remove('hidden');
        });
        showLoginBtn.addEventListener('click', () => {
            document.getElementById('login-view').classList.remove('hidden');
            document.getElementById('signup-view').classList.add('hidden');
        });
        
        // Soumission Formulaire Inscription
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('signup-username').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                await createUserProfile(userCredential.user.uid, email, username);
                showToast("Inscription réussie !", "success");
            } catch (error) {
                console.error("Erreur Inscription:", error);
                showToast(`Erreur: ${error.message}`, "error");
            }
        });
        
        // Soumission Formulaire Connexion
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            try {
                await signInWithEmailAndPassword(auth, email, password);
                showToast("Connexion réussie !", "success");
            } catch (error) {
                console.error("Erreur Connexion:", error);
                showToast(`Erreur: ${error.message}`, "error");
            }
        });
        
        // Connexion Google
        googleAuthBtn.addEventListener('click', async () => {
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
                showToast("Connexion Google réussie !", "success");
            } catch (error) {
                console.error("Erreur Google Auth:", error);
                showToast(`Erreur: ${error.message}`, "error");
            }
        });

        // Gestion menu mobile
        mobileMenuButton.addEventListener('click', () => {
            sidebar.classList.toggle('-translate-x-full');
            sidebar.classList.toggle('translate-x-0');
        });

        // Écouteurs pour les barres de recherche
        homeSearchInput.addEventListener('input', (e) => {
            renderResources(homeResourcesContainer, {}, e.target.value);
        });
        
        categorySearchInput.addEventListener('input', (e) => {
            const categoryName = decodeURIComponent(location.hash.split('?id=')[1] || '');
            renderResources(categoryResourcesContainer, { category: categoryName }, e.target.value);
        });


        // --- GESTION DE L'ÉDITEUR ET DU MODAL ---
        
        /**
         * Initialise l'éditeur Quill
         */
        function initializeQuill() {
            if (quillEditor || !document.getElementById('editor-container')) {
                return;
            }
            
            const toolbarOptions = [
                [{ 'header': [1, 2, 3, false] }, { 'font': [] }],
                ['bold', 'italic', 'underline', 'strike'],
                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                [{ 'script': 'sub'}, { 'script': 'super' }],
                [{ 'indent': '-1'}, { 'indent': '+1' }],
                [{ 'color': [] }, { 'background': [] }],
                ['link', 'image', 'video'],
                ['formula'],
                ['clean']
            ];

            quillEditor = new Quill('#editor-container', {
                modules: {
                    toolbar: toolbarOptions,
                    formula: true
                },
                theme: 'snow',
                placeholder: 'Rédigez votre cours ici...'
            });
        }
        
        /**
         * Charge les catégories dans les menus déroulants du modal.
         */
        function loadCategoriesIntoModal() {
            if (!categoryInput || !subcategoryInput) return;
            
            categoryInput.innerHTML = '<option value="">Choisir une catégorie</option>';
            subcategoryInput.innerHTML = '<option value="">Choisir une sous-catégorie</option>';
            
            categoriesData.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat.name;
                option.textContent = cat.name;
                categoryInput.appendChild(option);
            });

            categoryInput.addEventListener('change', () => {
                const selectedCategoryName = categoryInput.value;
                const selectedCategory = categoriesData.find(c => c.name === selectedCategoryName);
                
                subcategoryInput.innerHTML = '';
                if (selectedCategory && selectedCategory.subcategories) {
                    selectedCategory.subcategories.forEach(subcat => {
                        const option = document.createElement('option');
                        option.value = subcat;
                        option.textContent = subcat;
                        subcategoryInput.appendChild(option);
                    });
                } else {
                    subcategoryInput.innerHTML = '<option value="">Aucune sous-catégorie</option>';
                }
            });
        }

        // Ouvrir le Modal
        openModalBtn.addEventListener('click', () => {
            if (!quillEditor || quillEditor.getLength() < 10) {
                showToast("Veuillez écrire un peu de contenu avant de continuer.", "error");
                return;
            }
            metadataModal.classList.remove('hidden');
            loadCategoriesIntoModal();
        });

        // Fermer le Modal
        closeModalBtn.addEventListener('click', () => {
            metadataModal.classList.add('hidden');
        });

        // Soumission finale de la ressource (depuis le modal)
        createForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!currentUserId || !currentUserProfile || !quillEditor) {
                showToast("Erreur : vous n'êtes pas connecté ou votre profil n'est pas chargé.", "error");
                return;
            }
            
            submitResourceBtn.disabled = true;
            submitResourceBtn.textContent = "Publication...";

            try {
                const title = titleInput.value;
                const category = categoryInput.value;
                const subcategory = subcategoryInput.value;
                const imageFile = imageInput.files[0];
                
                const contentHtml = quillEditor.root.innerHTML;
                const contentText = quillEditor.getText(0, 200).trim();

                let imageUrl = null;
                
                if (imageFile && currentUserProfile && currentUserProfile.certification) {
                    const imageRef = ref(storage, `resources/${currentUserId}_${Date.now()}_${imageFile.name}`);
                    const snapshot = await uploadBytes(imageRef, imageFile);
                    imageUrl = await getDownloadURL(snapshot.ref);
                }
                
                const resourceData = {
                    title: title,
                    category: category,
                    subcategory: subcategory,
                    textContentHtml: contentHtml,
                    textContent: contentText,
                    imageUrl: imageUrl,
                    authorId: currentUserId,
                    authorName: currentUserProfile.username, 
                    createdAt: Timestamp.now(),
                    likes: [],
                    comments: []
                };

                await addDoc(collection(db, resourcesCollectionPath), resourceData);

                allResources = [];
                allUsersData = {};

                showToast("Ressource publiée avec succès !", "success");
                metadataModal.classList.add('hidden');
                quillEditor.setContents([]);
                createForm.reset();
                location.hash = '#home';
                
            } catch (error) {
                console.error("Erreur publication ressource:", error);
                showToast(`Erreur: ${error.message}`, "error");
            } finally {
                submitResourceBtn.disabled = false;
                submitResourceBtn.textContent = "Publier";
            }
        });


        // --- DÉMARRAGE DE L'APPLICATION ---
        
        /**
         * Charge les catégories et construit la sidebar.
         */
        function loadCategories() {
            try {
                categoriesData.forEach(cat => {
                    const link = document.createElement('a');
                    link.href = `#category?id=${encodeURIComponent(cat.name)}`;
                    link.className = 'flex items-center px-3 py-2 text-gray-300 rounded-md hover:bg-gray-700 hover:text-white';
                    link.dataset.pageId = 'category-page';
                    link.innerHTML = `
                        <i data-lucide="${cat.icon || 'folder'}" class="h-5 w-5 mr-3"></i>
                        ${cat.name}
                    `;
                    sidebarNav.appendChild(link);
                });
                if (typeof lucide !== 'undefined') {
                    lucide.createIcons();
                }
            } catch (error) {
                console.error("Erreur chargement catégories:", error);
            }
        }
        
        // Point d'entrée principal
        loadCategories();
        router();
        window.addEventListener('hashchange', router);

    </script>
    
    <!-- Scripts pour l'éditeur (chargés à la fin) -->
    <script src="https://cdn.jsdelivr.net/npm/katex@0.12.0/dist/katex.min.js"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
